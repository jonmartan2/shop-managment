<!doctype html>
<html dir="rtl" lang="ar">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/static/styles.css">
        <style>
            .upload-area {
                border: 2px dashed #ccc;
                border-radius: 8px;
                padding: 16px;
                text-align: center;
                cursor: pointer;
                transition: border-color 0.2s;
                position: relative;
            }
            .upload-area:hover {
                border-color: #888;
            }
            .upload-area input[type="file"] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }
            .upload-label {
                font-size: 14px;
                color: #666;
                pointer-events: none;
            }
            #uploadStatus {
                font-size: 13px;
                margin-top: 4px;
                min-height: 18px;
            }
            #imagePreview {
                width: 100%;
                max-height: 140px;
                object-fit: cover;
                border-radius: 6px;
                margin-top: 8px;
                display: none;
            }

            /* Search button & box */
            .search-wrapper {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .search-icon-btn {
                background: none;
                border: none;
                font-size: 18px;
                cursor: pointer;
                padding: 4px 6px;
                border-radius: 6px;
                transition: background 0.15s;
                line-height: 1;
            }
            .search-icon-btn:hover {
                background: rgba(0,0,0,0.08);
            }
            #searchBox {
                display: none;
                padding: 6px 12px;
                border: 1.5px solid #ccc;
                border-radius: 20px;
                font-size: 14px;
                outline: none;
                width: 200px;
                transition: border-color 0.2s, width 0.3s;
                font-family: inherit;
                direction: rtl;
            }
            #searchBox:focus {
                border-color: #888;
            }
            #searchBox.visible {
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🛍️ المحل</h1>
                <div class="search-wrapper">
                    <button class="search-icon-btn" onclick="toggleSearch()" title="بحث">🔍</button>
                    <input type="text" id="searchBox" placeholder="ابحث عن منتج..." oninput="filterItems()" />
                    <button class="add-btn" onclick="openModal()">+ إضافة منتج</button>
                </div>
            </div>
            <div class="grid" id="grid">
                <div class="empty-message">لا توجد منتجات، اضغط إضافة لإضافة منتجات جديدة</div>
            </div>
        </div>

        <!-- Modal for adding new items -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <h2>إضافة منتج جديد</h2>
                <div class="upload-area">
                    <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(this)">
                    <div class="upload-label">📁 اضغط لرفع صورة (JPG, PNG, GIF, WebP)</div>
                </div>
                <div id="uploadStatus"></div>
                <img id="imagePreview" alt="معاينة">
                <input type="text" id="itemName" placeholder="اسم المنتج" autocomplete="off">
                <input type="number" id="itemPrice" placeholder="السعر" autocomplete="off" step="0.01" min="0">
                <input type="number" id="itemQuantity" placeholder="الكمية الابتدائية" autocomplete="off" min="0" value="10">
                <div class="modal-buttons">
                    <button type="button" onclick="closeModal()">إلغاء</button>
                    <button type="button" onclick="addItem()">إضافة</button>
                </div>
            </div>
        </div>

        <!-- Info Panel Modal -->
        <div class="info-modal" id="infoModal">
            <div class="info-content" id="infoContent">
                <!-- Content will be populated dynamically -->
            </div>
        </div>

        <script src="/static/script.js"></script>
    </body>
</html>
